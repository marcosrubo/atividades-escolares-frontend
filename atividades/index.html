<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Atividades</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <div class="acoes" style="margin-bottom: 10px;">
      <a href="../index.html" class="btn btn-secundario">
        ⬅ Voltar ao menu
      </a>
    </div>

    <h1>Cadastro de Atividades</h1>

    <div id="modo" class="modo modo-cadastro">
      🟢 Modo Cadastro
    </div>

    <div class="card">
      <div class="form-grid">
        <div class="campo">
          <label for="id">ID</label>
          <input type="text" id="id" readonly>
        </div>

        <div class="campo">
          <label for="titulo">Título</label>
          <input type="text" id="titulo">
          <small class="erro" id="erroTitulo"></small>
        </div>

        <div class="campo">
          <label for="disciplinaId">Disciplina</label>
          <select id="disciplinaId"></select>
          <small class="erro" id="erroDisciplinaId"></small>
        </div>

        <div class="campo">
          <label for="serieAnoId">Série / Ano</label>
          <select id="serieAnoId"></select>
          <small class="erro" id="erroSerieAnoId"></small>
        </div>

        <div class="campo">
          <label for="arquivoPdf">Arquivo PDF</label>
          <input type="file" id="arquivoPdf" accept="application/pdf">
          <small class="erro" id="erroArquivoPdf"></small>
          <small id="infoArquivoAtual" class="arquivo-info"></small>
        </div>

        <div class="campo">
          <label for="atualizacao">Atualização</label>
          <input type="text" id="atualizacao" readonly>
        </div>

        <div class="campo campo-full">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" rows="4"></textarea>
          <small class="erro" id="erroDescricao"></small>
        </div>
      </div>

      <div class="acoes">
        <button class="btn btn-secundario" onclick="limpar()">
          🧹 Limpar
        </button>

        <button class="btn btn-sucesso" onclick="incluir()" id="btnCadastrar">
          ➕ Cadastrar
        </button>

        <button class="btn btn-primario" onclick="salvar()" id="btnSalvar">
          💾 Salvar
        </button>

        <button class="btn btn-perigo" onclick="excluir()" id="btnExcluir">
          🗑 Excluir
        </button>

        <button class="btn btn-cancelar" onclick="cancelarEdicao()" id="btnCancelar">
          ❌ Cancelar edição
        </button>
      </div>

      <div class="status" id="status">Pronto.</div>
    </div>

    <div class="card">
      <div class="barra-superior">
        <div class="busca-box">
          <label for="buscaTitulo">Buscar por título</label>
          <input
            type="text"
            id="buscaTitulo"
            placeholder="Digite parte do título..."
            oninput="filtrarTabela()"
          >
        </div>

        <div class="acoes-tabela">
          <button class="btn btn-secundario" onclick="carregarAtividades()">
            🔄 Atualizar
          </button>

          <button class="btn btn-secundario" onclick="exportarCSV()">
            📄 Exportar CSV
          </button>
        </div>
      </div>

      <div class="contador" id="contadorRegistros">0 registro(s)</div>

      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width: 90px;">ID</th>
              <th onclick="ordenarPor('titulo')" class="ordenavel">
                Título <span id="icone-titulo"></span>
              </th>
              <th style="width: 260px;">Descrição</th>
              <th onclick="ordenarPor('disciplina_nome')" class="ordenavel" style="width: 180px;">
                Disciplina <span id="icone-disciplina_nome"></span>
              </th>
              <th onclick="ordenarPor('serie_ano_nome')" class="ordenavel" style="width: 180px;">
                Série / Ano <span id="icone-serie_ano_nome"></span>
              </th>
              <th style="width: 120px;">PDF</th>
              <th style="width: 220px;">Atualização</th>
            </tr>
          </thead>
          <tbody id="tabela"></tbody>
        </table>
      </div>

      <div class="paginacao">
        <div>
          Itens por página:
          <select id="itensPorPagina" onchange="alterarItensPorPagina()">
            <option>5</option>
            <option selected>10</option>
            <option>20</option>
            <option>50</option>
          </select>
        </div>

        <div id="infoPaginacao">Página 1 de 1</div>

        <div>
          <button onclick="irParaPrimeiraPagina()">⏮</button>
          <button onclick="irParaPaginaAnterior()">◀</button>
          <button onclick="irParaProximaPagina()">▶</button>
          <button onclick="irParaUltimaPagina()">⏭</button>
        </div>
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal">
      <div id="modalTopo" class="modal-topo">Título</div>
      <div id="modalMensagem" class="modal-corpo">Mensagem</div>
      <div id="modalAcoes" class="modal-acoes"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
